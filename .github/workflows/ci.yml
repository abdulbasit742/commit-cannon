name: verify local benchmark

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: commit-cannon-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python and validate shell
        run: |
          python -m compileall -q commit_cannon generate.py scripts tests
          bash -n run.sh
      - name: Run regression tests
        env:
          PYTHONWARNINGS: error::ResourceWarning
        run: python -m unittest discover -s tests -p 'test_*.py' -v
      - name: Enforce repository safety contract
        run: python scripts/repository_check.py
      - name: Smoke-test isolated import and report
        run: |
          ./run.sh --count 25 --json benchmark-report.json > /tmp/commit-cannon-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("benchmark-report.json").read_text(encoding="utf-8"))
          assert report["count"] == 25
          assert report["integrity"] == "passed"
          assert report["remote_count"] == 0
          assert report["kept_repository"] is None
          PY
