name: verify local benchmark

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: commit-cannon-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python and validate shell
        run: |
          python -m compileall -q commit_cannon generate.py scripts tests
          bash -n run.sh
      - name: Run regression tests
        env:
          PYTHONWARNINGS: error::ResourceWarning
        run: python -m unittest discover -s tests -p 'test_*.py' -v
      - name: Enforce repository safety contract
        run: python scripts/repository_check.py
      - name: Smoke-test isolated import and report
        run: |
          ./run.sh --count 25 --json benchmark-report.json > /tmp/commit-cannon-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("benchmark-report.json").read_text(encoding="utf-8"))
          assert report["schema_version"] == 2
          assert report["count"] == 25
          assert report["integrity"] == "passed"
          assert report["remote_count"] == 0
          assert report["object_format"] == "sha1"
          assert len(report["tip_oid"]) == 40
          assert report["kept_repository"] is None
          PY
          test "$(./run.sh --count 1 --json benchmark-report.json >/dev/null 2>&1; echo $?)" = "2"
      - name: Smoke-test bounded statistical suite
        run: |
          python -m commit_cannon.suite --count 5 --runs 3 --warmups 1 --json suite-report.json > /tmp/commit-cannon-suite.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("suite-report.json").read_text(encoding="utf-8"))
          assert report["schema_version"] == 1
          assert report["benchmark_schema_version"] == 2
          assert report["runs"] == 3
          assert report["warmups"] == 1
          assert report["total_generated_commits"] == 20
          assert report["integrity"] == "passed"
          assert len(report["samples"]) == 3
          assert len({sample["tip_oid"] for sample in report["samples"]}) == 1
          PY
          test "$(python -m commit_cannon.suite --count 100000 --runs 3 --warmups 1 >/dev/null 2>&1; echo $?)" = "2"
      - name: Smoke-test atomic kept repository publication
        run: |
          publish_root="$(mktemp -d)"
          destination="$publish_root/verified-repository"
          report="$publish_root/kept-report.json"
          ./run.sh --count 9 --branch benchmark/ci --keep "$destination" --json "$report" >/tmp/commit-cannon-kept.json
          test -d "$destination/.git"
          test -f "$report"
          test -z "$(git -C "$destination" remote)"
          test "$(git -C "$destination" rev-list --count refs/heads/benchmark/ci)" = "9"
          test -z "$(find "$publish_root" -maxdepth 1 -name '.commit-cannon-stage-*' -print -quit)"
          python - "$destination" "$report" <<'PY'
          import json
          import sys
          from pathlib import Path

          destination = str(Path(sys.argv[1]).resolve())
          report = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          assert report["kept_repository"] == destination
          assert report["integrity"] == "passed"
          assert report["remote_count"] == 0
          PY
          mkdir "$publish_root/existing-empty"
          test "$(./run.sh --count 1 --keep "$publish_root/existing-empty" >/dev/null 2>&1; echo $?)" = "2"
